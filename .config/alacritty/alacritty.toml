
[font]
size = 12

[font.bold]
family = "FiraCode Nerd Font Propo"
style = "Bold"

[font.glyph_offset]
x = 0
y = 0

[font.italic]
family = "FiraCode Nerd Font SemBd"
style = "Italic"

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[font.offset]
x = 0
y = 0

[general]
import = ["~/.config/alacritty/palette.toml"]

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control"

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control"

[[keyboard.bindings]]
action = "ReceiveChar"
key = "C"
mods = "Control|Shift"

# Cyrillic layout (RU/UA) — same physical keys as C and V
[[keyboard.bindings]]
action = "Copy"
key = "С"
mods = "Control"

[[keyboard.bindings]]
action = "Paste"
key = "М"
mods = "Control"

[[keyboard.bindings]]
action = "ReceiveChar"
key = "С"
mods = "Control|Shift"
