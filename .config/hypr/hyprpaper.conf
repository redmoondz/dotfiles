# Hyprpaper Configuration File
# https://github.com/hyprwm/hyprpaper

# Preload wallpapers
# preload = ~/Pictures/Wallpapers/2.png
# preload = ~/Pictures/wallpaper2.png

# Set wallpaper for specific monitors
# wallpaper = ,~/Pictures/wallpaper1.jpg
# wallpaper = eDP-1,~/Pictures/Wallpapers/1.png
# wallpaper = HDMI-A-1,~/Pictures/wallpaper1.jpg

# Enable splash screen
splash = false

# Enable IPC (Inter-Process Communication) - required for hyprctl commands
ipc = on






preload = /home/rdmoon/Pictures/Wallpapers/Porsche 911 GTS parked at the side of a road.jpg
wallpaper = ,/home/rdmoon/Pictures/Wallpapers/Porsche 911 GTS parked at the side of a road.jpg
