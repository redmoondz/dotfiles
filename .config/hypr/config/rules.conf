# See https://wiki.hyprland.org/Configuring/Window-Rules/

# '$&' is a hyde specific shorthand for "override" \\ analogous to a reference
# This symbol indicates that the following values will override the default configuration
$&=override

windowrule = match:class firefox, opacity 0.90 0.90 1
windowrule = match:class Brave-browser, opacity 0.90 0.90 1
windowrule = match:class code-oss, opacity 0.90 0.80 1
windowrule = match:class ^[Cc]ode$, opacity 0.80 0.80 1
windowrule = match:class code-url-handler, opacity 0.80 0.80 1
windowrule = match:class code-insiders-url-handler, opacity 0.80 0.80 1
# windowrule = match:class kitty, opacity 0.90 0.90 1
windowrule = match:class org.kde.dolphin, opacity 0.80 0.80 1
windowrule = match:class org.kde.ark, opacity 0.80 0.80 1
windowrule = match:class nwg-look, opacity 0.80 0.80 1
windowrule = match:class qt5ct, opacity 0.80 0.80 1
windowrule = match:class qt6ct, opacity 0.80 0.80 1
windowrule = match:class kvantummanager, opacity 0.80 0.80 1
windowrule = match:class org.pulseaudio.pavucontrol, opacity 0.80 0.70 1
windowrule = match:class blueman-manager, opacity 0.80 0.70 1
windowrule = match:class nm-applet, opacity 0.80 0.70 1
windowrule = match:class nm-connection-editor, opacity 0.80 0.70 1
windowrule = match:class org.kde.polkit-kde-authentication-agent-1, opacity 0.80 0.70 1
windowrule = match:class polkit-gnome-authentication-agent-1, opacity 0.80 0.70 1
windowrule = match:class org.freedesktop.impl.portal.desktop.gtk, opacity 0.80 0.70 1
windowrule = match:class org.freedesktop.impl.portal.desktop.hyprland, opacity 0.80 0.70 1
windowrule = match:class ^[Ss]team$, opacity 0.70 0.70 1
windowrule = match:class steamwebhelper, opacity 0.70 0.70 1
windowrule = match:class ^[Ss]potify$, opacity 0.70 0.70 1
windowrule = match:initial_title Spotify Free, opacity 0.70 0.70 1
windowrule = match:initial_title Spotify Premium, opacity 0.70 0.70 1

windowrule = match:class com.github.rafostar.Clapper, opacity 0.90 0.90 1
windowrule = match:class com.github.tchx84.Flatseal, opacity 0.80 0.80 1
windowrule = match:class hu.kramo.Cartridges, opacity 0.80 0.80 1
windowrule = match:class com.obsproject.Studio, opacity 0.80 0.80 1
windowrule = match:class gnome-boxes, opacity 0.80 0.80 1
windowrule = match:class vesktop, opacity 0.80 0.80 1
windowrule = match:class discord, opacity 0.80 0.80 1
windowrule = match:class WebCord, opacity 0.80 0.80 1
windowrule = match:class ArmCord, opacity 0.80 0.80 1
windowrule = match:class app.drey.Warp, opacity 0.80 0.80 1
windowrule = match:class net.davidotek.pupgui2, opacity 0.80 0.80 1
windowrule = match:class yad, opacity 0.80 0.80 1
windowrule = match:class Signal, opacity 0.80 0.80 1
windowrule = match:class io.github.alainm23.planify, opacity 0.80 0.80 1
windowrule = match:class io.gitlab.theevilskeleton.Upscaler, opacity 0.80 0.80 1
windowrule = match:class com.github.unrud.VideoDownloader, opacity 0.80 0.80 1
windowrule = match:class io.gitlab.adhami3310.Impression, opacity 0.80 0.80 1
windowrule = match:class io.missioncenter.MissionCenter, opacity 0.80 0.80 1
windowrule = match:class io.github.flattool.Warehouse, opacity 0.80 0.80 1

windowrule = match:class org.kde.dolphin, match:title Progress Dialog — Dolphin, float on
windowrule = match:class org.kde.dolphin, match:title Copying — Dolphin, float on
windowrule = match:title About Mozilla Firefox, float on
windowrule = match:class firefox, match:title Picture-in-Picture, float on
windowrule = match:class firefox, match:title Library, float on
windowrule = match:class kitty, match:title top, float on
windowrule = match:class kitty, match:title btop, float on
windowrule = match:class kitty, match:title htop, float on
windowrule = match:class vlc, float on
windowrule = match:class kvantummanager, float on
windowrule = match:class qt5ct, float on
windowrule = match:class qt6ct, float on
windowrule = match:class nwg-look, float on
windowrule = match:class org.kde.ark, float on
windowrule = match:class org.pulseaudio.pavucontrol, float on
windowrule = match:class blueman-manager, float on
windowrule = match:class nm-applet, float on
windowrule = match:class nm-connection-editor, float on
windowrule = match:class org.kde.polkit-kde-authentication-agent-1, float on

windowrule = match:class Signal, float on
windowrule = match:class com.github.rafostar.Clapper, float on
windowrule = match:class app.drey.Warp, float on
windowrule = match:class net.davidotek.pupgui2, float on
windowrule = match:class yad, float on
windowrule = match:class eog, float on
windowrule = match:class io.github.alainm23.planify, float on
windowrule = match:class io.gitlab.theevilskeleton.Upscaler, float on
windowrule = match:class com.github.unrud.VideoDownloader, float on
windowrule = match:class io.gitlab.adhami3310.Impression, float on
windowrule = match:class io.missioncenter.MissionCenter, float on

windowrule = match:title ^(Choose Files)$ float on
windowrule = match:title ^(Save As)$ float on
windowrule = match:title ^(Confirm to replace files)$ float on
windowrule = match:title ^(File Operation Progress)$ float on

windowrule = match:class xdg-desktop-portal-gtk, float on

# █░░ ▄▀█ █▄█ █▀▀ █▀█   █▀█ █░█ █░░ █▀▀ █▀
# █▄▄ █▀█ ░█░ ██▄ █▀▄   █▀▄ █▄█ █▄▄ ██▄ ▄█

layerrule = blur on, match:namespace rofi
layerrule = blur on, match:namespace notifications
layerrule = blur on, match:namespace swaync-notification-window
layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace logout_dialog


