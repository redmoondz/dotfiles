# ╔═══════════════════════════════════════════════════════════════════╗
# ║                        Window Decoration                         ║
# ╚═══════════════════════════════════════════════════════════════════╝
# Rounding, transparency, blur, and shadows

decoration {
    # Window rounding
    rounding = 10
    
    # Window transparency
    active_opacity = 0.98
    inactive_opacity = 0.95
    
    # Blur effects
    blur {
        enabled = yes
        size = 10
        passes = 1
        new_optimizations = on
    }
    
    # Drop shadows
    shadow {
        enabled = false
        ignore_window = true
        range = 4
        offset = 2 2
        render_power = 2
        color = 0x66000000
    }
}
