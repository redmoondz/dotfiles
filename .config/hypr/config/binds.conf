
# --- applications.conf ---
# ╔═══════════════════════════════════════════════════════════════════╗
# ║                      Application Launchers                       ║
# ╚═══════════════════════════════════════════════════════════════════╝
# Keybinds for launching applications and tools

# Define main modifier
$mainMod = SUPER

#MX Master 3 thumb button
# bind = SUPER, LEFT, workspace, e-1
# bind = SUPER, RIGHT, workspace, e+1

# MX Master 3S Host Change Button
bind = SUPER, F1, exec, solaar config "MX Master 3S" change-host 2
# bind = SUPER, F2, exec, solaar config "MX Master 3S" change-host 1

#  Text2Speech
bind = ALTR, M, exec, voxtype record start
bindr = ALTR, M, exec, voxtype record stop
# ╭─────────────────────────────────────────────────────────────────╮
# │                      Core Applications                         │
# ╰─────────────────────────────────────────────────────────────────╯
bind = $mainMod, RETURN, exec, alacritty
bind = $mainMod, E, exec, nautilus
bind = $mainMod, F, exec, google-chrome-stable #firefox
bind = $mainMod_SHIFT, F, exec, google-chrome-stable --private-window
bind = $mainMod, C, exec, code
bind = $mainMod, T, exec, Telegram
bind = $mainMod, O, exec, obs
bind = $mainMod_SHIFT, S, exec, spotify

# ╭─────────────────────────────────────────────────────────────────╮
# │                         Rofi Menus                             │
# ╰─────────────────────────────────────────────────────────────────╯
bind = $mainMod, D, exec, ~/.config/rofi/launchers/launcher.sh
bind = $mainMod, R, exec, ~/.config/rofi/run/run.sh
bind = $mainMod, X, exec, ~/.config/rofi/powermenu/type-2/powermenu.sh
bind = $mainMod, Z, exec, ~/.config/rofi/filebrowser/filebrowser.sh
bind = $mainMod, V, exec, ~/.config/rofi/clipboard/clipboard.sh

bind = $mainMod, B, exec, ~/.config/rofi/bluetooth/blt-connect.sh

bind = $mainMod_SHIFT, V, exec, ~/.config/rofi/snippet/snippet.sh
bind = $mainMod, comma, exec, ~/.config/rofi/emoji/emoji.sh
bind = $mainMod, W, exec, ~/.config/rofi/wifi/wifi.sh
bind = $mainMod_SHIFT, W, exec, ~/.config/rofi/wifi/wifinew.sh

# ╭─────────────────────────────────────────────────────────────────╮
# │                        Screenshots                             │
# ╰─────────────────────────────────────────────────────────────────╯
# Region screenshot
bind = ALT_SHIFT, 1, exec, FILE=~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png; grim -g "$(slurp)" - | tee >(wl-copy) | { cat > "$FILE" && [ -s "$FILE" ] && dunstify -i "$FILE" "Screenshot of the region taken" -t 1000 || rm -f "$FILE"; }

# Full screen screenshot
bind = , Print, exec, grim - | wl-copy && wl-paste > ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png | dunstify -i ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png "Screenshot of whole screen taken" -t 1000

# ╭─────────────────────────────────────────────────────────────────╮
# │                        Wallpaper                               │
# ╰─────────────────────────────────────────────────────────────────╯
bind = $mainMod_CTRL, W, exec, ~/.config/hypr/scripts/random_wallpaper.sh

# --- main.conf ---
# ╔═══════════════════════════════════════════════════════════════════╗
# ║                         Main Keybinds                            ║
# ╚═══════════════════════════════════════════════════════════════════╝
# Core window management and navigation keybinds

# ╭─────────────────────────────────────────────────────────────────╮
# │                      Window Management                         │
# ╰─────────────────────────────────────────────────────────────────╯
bind = $mainMod, Q, killactive,
bind = ALT, F4, killactive,
bind = $mainMod, F11, fullscreen
bind = $mainMod, S, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# ╭─────────────────────────────────────────────────────────────────╮
# │                         Focus Movement                         │
# ╰─────────────────────────────────────────────────────────────────╯
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Alt+Tab functionality
bind = ALT, Tab, cyclenext
bind = $mainMod, Tab, swapnext

# ╭─────────────────────────────────────────────────────────────────╮
# │                         Window Movement                        │
# ╰─────────────────────────────────────────────────────────────────╯
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# ╭─────────────────────────────────────────────────────────────────╮
# │                         Window Resizing                        │
# ╰─────────────────────────────────────────────────────────────────╯
# Resize active window with Super +/-
binde = $mainMod, equal, resizeactive, 30 30
binde = $mainMod, minus, resizeactive, -30 -30

# ╭─────────────────────────────────────────────────────────────────╮
# │                        Waybar Theme Switcher                   │
# ╰─────────────────────────────────────────────────────────────────╯
bind = SUPER SHIFT, K, exec, ~/.config/waybar/scripts/cycle-theme.sh

# ╭─────────────────────────────────────────────────────────────────╮
# │                      Mouse Window Actions                      │
# ╰─────────────────────────────────────────────────────────────────╯
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ╭─────────────────────────────────────────────────────────────────╮
# │                      Volume Controls                           │
# ╰─────────────────────────────────────────────────────────────────╯
binde = , XF86AudioRaiseVolume, exec, vol=$(pamixer -i 5 && pamixer --get-volume) && dunstify -h int:value:"$vol" -i ~/.config/dunst/assets/volume.svg -t 500 -r 2593 "Volume: $vol %" %

binde = , XF86AudioLowerVolume, exec, vol=$(pamixer -d 5 && pamixer --get-volume) && dunstify -h int:value:"$vol" -i ~/.config/dunst/assets/volume.svg -t 500 -r 2593 "Volume: $vol %" &

bind = , XF86AudioMute, exec, pamixer -t && dunstify -i ~/.config/dunst/assets/$(pamixer --get-mute | grep -q "true" && echo "volume-mute.svg" || echo "volume.svg") -t 500 -r 2593 "Toggle Mute"

# Volume control with GUI
bind = $mainMod_SHIFT, V, exec, pavucontrol

# ╭─────────────────────────────────────────────────────────────────╮
# │                    Brightness Controls                         │
# ╰─────────────────────────────────────────────────────────────────╯
#For notebook brightness keys, use the following binds. Make sure to have brillo installed and configured properly.

# bind = , XF86MonBrightnessDown, exec, brillo -U 5 && dunstify -h int:value:"$(brillo -G | cut -d'.' -f1)" -i ~/.config/dunst/assets/brightness.svg -t 500 -r 2593 "Brightness: $(brillo -G | cut -d'.' -f1)%"
# bind = , XF86MonBrightnessUp, exec, brillo -A 5 && dunstify -h int:value:"$(brillo -G | cut -d'.' -f1)" -i ~/.config/dunst/assets/brightness.svg -t 500 -r 2593 "Brightness: $(brillo -G | cut -d'.' -f1)%"

#For external monitor brightness control using DDC/CI, use the following binds. Make sure to have ddcutil installed and configured properly.

binde = $mainMod, F2, exec, ddcutil setvcp 10 - 10 && bri=$(ddcutil getvcp 10 --terse | awk '{print $4}') && dunstify -h int:value:"$bri" -i ~/.config/dunst/assets/brightness.svg -t 500 -r 2594 "Monitor Brightness: $bri"
binde = $mainMod, F3, exec, ddcutil setvcp 10 + 10 && bri=$(ddcutil getvcp 10 --terse | awk '{print $4}') && dunstify -h int:value:"$bri" -i ~/.config/dunst/assets/brightness.svg -t 500 -r 2594 "Monitor Brightness: $bri"
# ╭─────────────────────────────────────────────────────────────────╮
# │                      Media Player Controls                     │
# ╰─────────────────────────────────────────────────────────────────╯
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86audiostop, exec, playerctl stop

# ╭─────────────────────────────────────────────────────────────────╮
# │                      Power Management                          │
# ╰─────────────────────────────────────────────────────────────────╯
bind = $mainMod_SHIFT_ALT, P, exec, shutdown -h now
bind = $mainMod_SHIFT_ALT, R, exec, reboot
bind = $mainMod_SHIFT_ALT, L, exit,

# ╭─────────────────────────────────────────────────────────────────╮
# │                      Screen Control                            │
# ╰─────────────────────────────────────────────────────────────────╯
bind = $mainMod_SHIFT_ALT, S, exec, sleep 1 && hyprctl dispatch dpms off  # turn off screen
bind = $mainMod_SHIFT, S, exec, sleep 1 && hyprctl dispatch dpms on       # turn on screen

# ╭─────────────────────────────────────────────────────────────────╮
# │                      Lock Screen                               │
# ╰─────────────────────────────────────────────────────────────────╯
bind = $mainMod, L, exec, hyprlock

# ╭─────────────────────────────────────────────────────────────────╮
# │                    Configuration Management                     │
# ╰─────────────────────────────────────────────────────────────────╯
bind = $mainMod SHIFT, R, exec, sh ~/.config/hypr/scripts/reload.sh  # reload hyprland config

# ╭─────────────────────────────────────────────────────────────────╮
# │                      Waybar Toggle                             │
# ╰─────────────────────────────────────────────────────────────────╯
bind = $mainMod, K, exec, killall waybar || waybar  # hide or restart waybar


# --- workspaces.conf ---
# ╔═══════════════════════════════════════════════════════════════════╗
# ║                       Workspace Controls                         ║
# ╚═══════════════════════════════════════════════════════════════════╝
# Workspace switching and window movement between workspaces

# ╭─────────────────────────────────────────────────────────────────╮
# │                      Switch Workspaces                         │
# ╰─────────────────────────────────────────────────────────────────╯
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# ╭─────────────────────────────────────────────────────────────────╮
# │                    Move Window to Workspace                    │
# ╰─────────────────────────────────────────────────────────────────╯
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# ╭─────────────────────────────────────────────────────────────────╮
# │                    Scroll Through Workspaces                   │
# ╰─────────────────────────────────────────────────────────────────╯
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

