
# --- animations.conf ---
# ╔═══════════════════════════════════════════════════════════════════╗
# ║                           Animations                             ║
# ╚═══════════════════════════════════════════════════════════════════╝
# Window animations and transitions

animations {
    enabled = true

    # Define bezier curves for smooth animations
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    # Animation configurations
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}


# --- decoration.conf ---
# ╔═══════════════════════════════════════════════════════════════════╗
# ║                        Window Decoration                         ║
# ╚═══════════════════════════════════════════════════════════════════╝
# Rounding, transparency, blur, and shadows

decoration {
    # Window transparency
    active_opacity = 1
    inactive_opacity = 0.9

    # Window rounding
    rounding = 10
    
    # Blur effects
    blur {
        enabled = yes
        size = 10
        passes = 1
        new_optimizations = on
    }
    
    # Drop shadows
    shadow {
        enabled = false
        ignore_window = true
        range = 4
        offset = 2 2
        render_power = 2
        color = 0x66000000
    }
}


# --- general.conf ---
# ╔═══════════════════════════════════════════════════════════════════╗
# ║                        General Appearance                        ║
# ╚═══════════════════════════════════════════════════════════════════╝
# Window borders, gaps, and layout settings

general {
    # Gaps between windows
    gaps_in = 5
    gaps_out = 5
    
    # Border settings
    border_size = 1
    # no_border_on_floating = true
    
    # Border colors - Dracula theme inspired
    col.active_border = rgb(44475a)
    col.inactive_border = rgb(1a1a1a)
    
    # Layout
    layout = dwindle
    
    # Resizing
    resize_on_border = false
    extend_border_grab_area = 15
    hover_icon_on_border = true
    
    # Performance
    allow_tearing = false
}

