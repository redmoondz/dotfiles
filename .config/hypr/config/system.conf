
# --- autostart.conf ---
# ╔═══════════════════════════════════════════════════════════════════╗
# ║                        Autostart Applications                    ║
# ╚═══════════════════════════════════════════════════════════════════╝
# Applications to start automatically when Hyprland starts

# Custom autostart applications
exec-once = spotify
exec-once = discord
exec-once = telegram-desktop

#Text2speech
exec-once = voxtype
# Notification daemon
exec-once = dunst
# Status bar
exec-once = waybar 
# Wallpaper daemon
exec-once = hyprpaper 
# Clipboard manager
exec-once = wl-paste --watch cliphist store 
# Notification daemon
exec-once = dunst -conf ~/.config/dunst/dunstrc
# Audio effects
exec-once = easyeffects --gapplication-service
# Idle manager
exec-once = hypridle
# Startup wallpaper script
exec-once = sh ~/.config/hypr/scripts/startup-wallpaper.sh
# Authentication agent (for password prompts)
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
# Screen sharing support
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP


# --- environment.conf ---
# ╔═══════════════════════════════════════════════════════════════════╗
# ║                       Environment Variables                      ║
# ╚═══════════════════════════════════════════════════════════════════╝
# See https://wiki.hyprland.org/Configuring/Environment-variables/

# Cursor settings
env = XCURSOR_SIZE, 24

# Wayland specific
env = XDG_SESSION_TYPE, wayland
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_DESKTOP, Hyprland

# Qt specific
env = QT_QPA_PLATFORM, wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1

# GTK specific  
env = GDK_BACKEND, wayland,x11

# Mozilla/Firefox
env = MOZ_ENABLE_WAYLAND, 1


# --- monitors.conf ---
# ╔═══════════════════════════════════════════════════════════════════╗
# ║                        Monitor Configuration                     ║
# ╚═══════════════════════════════════════════════════════════════════╝
# See https://wiki.hyprland.org/Configuring/Monitors/

# Primary laptop display
monitor = eDP-1, 1920x1080, 0x0, 1

# External HDMI monitor
monitor = HDMI-A-1, 1920x1080@80, 0x0, 1

