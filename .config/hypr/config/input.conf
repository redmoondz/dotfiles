
# --- keyboard.conf ---
# ╔═══════════════════════════════════════════════════════════════════╗
# ║                        Keyboard Configuration                    ║
# ╚═══════════════════════════════════════════════════════════════════╝
# Keyboard layout and input settings

input {
    # Keyboard layouts: English, Russian, Ukrainian
    kb_layout = us, ru, ua
    kb_options = 
    
    # Numlock enabled by default
    numlock_by_default = true
    
    # Key repeat settings
    repeat_delay = 250
    repeat_rate = 35
    
    # Other input settings
    special_fallthrough = true
    follow_mouse = 1
}

# Language switching keybinds
# Win + Space -> English
bind = SUPER, SPACE, exec, hyprctl switchxkblayout main 0

# Win + Space + Shift -> Russian  
bind = SUPER_SHIFT, SPACE, exec, hyprctl switchxkblayout main 1

# Win + Space + Ctrl -> Ukrainian
bind = SUPER_CONTROL, SPACE, exec, hyprctl switchxkblayout main 2


# --- mouse.conf ---
# ╔═══════════════════════════════════════════════════════════════════╗
# ║                         Mouse & Touchpad                         ║
# ╚═══════════════════════════════════════════════════════════════════╝
# Mouse and touchpad configuration

input {
    touchpad {
        natural_scroll = yes
        disable_while_typing = true
        clickfinger_behavior = true
        scroll_factor = 0.5
    }
    scroll_factor = 0.2
}

