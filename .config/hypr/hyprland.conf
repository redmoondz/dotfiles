# ╔═══════════════════════════════════════════════════════════════════╗
# ║                     Hyprland Configuration                       ║
# ║                         Entry Point                              ║
# ╚═══════════════════════════════════════════════════════════════════╝
# 
# This is the main configuration file that sources all other configs
# Organized by functionality for better maintainability
#
# See https://wiki.hyprland.org/Configuring/

# ╭─────────────────────────────────────────────────────────────────╮
# │                        System Configuration                    │
# ╰─────────────────────────────────────────────────────────────────╯
source = ~/.config/hypr/config/system/monitors.conf
source = ~/.config/hypr/config/system/environment.conf
source = ~/.config/hypr/config/system/autostart.conf

# ╭─────────────────────────────────────────────────────────────────╮
# │                        Input Configuration                     │
# ╰─────────────────────────────────────────────────────────────────╯
source = ~/.config/hypr/config/input/keyboard.conf
source = ~/.config/hypr/config/input/mouse.conf

# ╭─────────────────────────────────────────────────────────────────╮
# │                        Visual Configuration                    │
# ╰─────────────────────────────────────────────────────────────────╯
source = ~/.config/hypr/config/visual/general.conf
source = ~/.config/hypr/config/visual/decoration.conf
source = ~/.config/hypr/config/visual/animations.conf

# ╭─────────────────────────────────────────────────────────────────╮
# │                        Layout Configuration                    │
# ╰─────────────────────────────────────────────────────────────────╯
source = ~/.config/hypr/config/layouts/dwindle.conf
source = ~/.config/hypr/config/layouts/master.conf

# ╭─────────────────────────────────────────────────────────────────╮
# │                        Rules Configuration                     │
# ╰─────────────────────────────────────────────────────────────────╯
source = ~/.config/hypr/config/rules/window.conf
source = ~/.config/hypr/config/rules/workspace.conf

# ╭─────────────────────────────────────────────────────────────────╮
# │                        Keybinds Configuration                  │
# ╰─────────────────────────────────────────────────────────────────╯
source = ~/.config/hypr/config/binds/main.conf
source = ~/.config/hypr/config/binds/media.conf
source = ~/.config/hypr/config/binds/applications.conf
source = ~/.config/hypr/config/binds/workspaces.conf
source = ~/.config/hypr/config/binds/system.conf

# ╭─────────────────────────────────────────────────────────────────╮
# │                        Miscellaneous                           │
# ╰─────────────────────────────────────────────────────────────────╯
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

gesture = 3, horizontal, workspace
