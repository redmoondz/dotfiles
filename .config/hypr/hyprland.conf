# ╔═══════════════════════════════════════════════════════════════════╗
# ║                     Hyprland Configuration                       ║
# ║                         Entry Point                              ║
# ╚═══════════════════════════════════════════════════════════════════╝
# 
# This is the main configuration file that sources all other configs
# Organized by functionality for better maintainability
#
# See https://wiki.hyprland.org/Configuring/
$mainMod = SUPER

source = ~/.config/hypr/config/system.conf
source = ~/.config/hypr/config/input.conf
source = ~/.config/hypr/config/visual.conf
source = ~/.config/hypr/config/layouts.conf
# source = ~/.config/hypr/config/rules.confR
source = ~/.config/hypr/config/binds.conf

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

gesture = 3, horizontal, workspace
