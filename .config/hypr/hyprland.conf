# ╔═══════════════════════════════════════════════════════════════════╗
# ║                     Hyprland Configuration                       ║
# ║                         Entry Point                              ║
# ╚═══════════════════════════════════════════════════════════════════╝
# 
# This is the main configuration file that sources all other configs
# Organized by functionality for better maintainability
#
# See https://wiki.hyprland.org/Configuring/
$mainMod = SUPER

source = ~/.config/hypr/config/system.conf
source = ~/.config/hypr/config/input.conf
source = ~/.config/hypr/config/visual.conf
source = ~/.config/hypr/config/layouts.conf
source = ~/.config/hypr/config/rules.conf
source = ~/.config/hypr/config/binds.conf

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = 1
    vrr = 0
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    enable_swallow = false
    swallow_regex = (foot|kitty|allacritty|Alacritty)
    allow_session_lock_restore = true
    initial_workspace_tracking = false
    focus_on_activate = false
}

binds {
    scroll_event_delay = 0
    hide_special_on_workspace_change = true
}

gestures {
    workspace_swipe_distance = 700
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new = true
}

# Fix: disable hardware cursors to prevent ghost cursor from GDM on NVIDIA
cursor {
    no_hardware_cursors = true
}

gesture = 3, horizontal, workspace
